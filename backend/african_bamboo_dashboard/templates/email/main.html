<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>
        {% if subject %}{{ subject }}{% else %}African Bamboo{% endif %}
    </title>
</head>
<body style="font-family: sans-serif; color: #222; line-height: 1.5;">
    <p>Hello {{ name }},</p>
    <p>{{ body }}</p>
    {% if cta_url %}
    <p>
        <a href="{{ cta_url }}"
           style="display: inline-block; padding: 10px 16px;
                  background: #0f766e; color: #fff;
                  text-decoration: none; border-radius: 4px;">
            {% if cta_text %}{{ cta_text }}{% else %}Open dashboard{% endif %}
        </a>
    </p>
    {% endif %}
    <p>&mdash; African Bamboo</p>
</body>
</html>
